git.commit.message.full=Convert remaining production source from Groovy to Java 26\n\nProduction\:\n- SedanDriver, ISedanOperation, AbstractSedanOperation, three concrete operations, and\n  SedanOperationFactory are now pure Java 26\n- Operation hierarchy uses a sealed interface (SedanOperation) + three records\n  (AdditionSedanOperation, UpdateSedanOperation, DeletionSedanOperation); sealed permits\n  make switch expressions exhaustive at compile time, eliminating SedanOperationFactory\n- OperationContext.toOperation() replaces SedanOperationFactory with an exhaustive switch expression\n- OperationContextFactory drops Guava Preconditions for Java pattern-matching instanceof\n- SedanDataRegistry drops Guava ImmutableList/Preconditions for CopyOnWriteArrayList\n- MapSedanDataAdapter drops commons-collections4 MapUtils\n\npom.xml\:\n- Target Java 26 (maven.compiler.release); GMavenPlus targets bytecode 25 (highest accepted\n  by gmavenplus-plugin 4.3.1); Groovy moved to test scope\n- commons-lang3, commons-collections4, and Guava removed (no longer used in production)\n\nTests\:\n- Operation impl/ tests replaced with behavioural record tests in operation/ package\n- SedanOperationFactoryTest replaced with OperationContextTest covering toOperation()\n- SedanDriverTest removes Groovy-MOP delegation tests (incompatible with Java callers);\n  difference() and hasDifferentValueAtKey() behavioural tests retained\n\nCo-Authored-By\: Claude Sonnet 4.6 <noreply@anthropic.com>
